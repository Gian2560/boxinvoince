services:
  # 1. El Buzón (Redis)
  redis:
    image: redis:7-alpine
    container_name: karaoke_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 2. Tu servidor web (FastAPI)
  api:
    build: .
    container_name: karaoke_api
    # Arrancamos Uvicorn para que escuche hacia afuera del contenedor
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # Sincroniza tu código en vivo (si cambias algo en VS Code, se actualiza)
      - ./uploads:/app/uploads # Comparten la carpeta de audios
    depends_on:
      - redis

  # 3. El Trabajador (Celery + Demucs + Whisper)
  worker:
    build: .
    container_name: karaoke_worker
    # No necesitamos "-P solo" en Linux/Docker, corre de forma nativa y más rápido
    command: celery -A app.tasks worker --loglevel=info
    volumes:
      - .:/app
      - ./uploads:/app/uploads # Comparten la carpeta de audios
    depends_on:
      - redis

volumes:
  redis_data: